name: Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - '.github/actions/**'
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
      - '.github/actions/**'
  workflow_dispatch:

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Ruff
        uses: ./.github/actions/ruff-check
        with:
          project-dir: backend

  ty:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: ./.github/actions/setup-python
        with:
          project-dir: backend

      - name: Run Ty
        uses: ./.github/actions/ty-check
        with:
          project-dir: backend
